<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Contact Confirmation | CrateLuv</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #fdfdfd; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; border: 1px solid #eee; border-radius: 15px; width: 100%; max-width: 400px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .logo { color: #e74c3c; font-weight: bold; font-size: 24px; text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.2rem; text-align: center; color: #333; margin-bottom: 10px; }
        p { font-size: 0.95rem; color: #666; text-align: center; line-height: 1.5; }
        .form-group { margin-top: 25px; border-top: 1px solid #f0f0f0; padding-top: 20px; }
        .checkbox-container { display: flex; align-items: flex-start; margin-bottom: 20px; cursor: pointer; }
        .checkbox-container input { margin-top: 4px; margin-right: 12px; width: 20px; height: 20px; }
        .checkbox-label { font-size: 0.85rem; color: #444; line-height: 1.4; }
        .btn { background: #e74c3c; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 1rem; margin-top: 10px; cursor: pointer; }
        .legal { font-size: 0.75rem; color: #999; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">CrateLuv</div>
    <h1>Emergency Responder Request</h1>
    <p>Patrick L. Harvey has requested that you be an emergency contact for their pet, <strong>[Pet Name]</strong>.</p>

    <div class="form-group">
        <label class="checkbox-container">
            <input type="checkbox" id="sms-consent">
            <span class="checkbox-label">
                <strong>Optional:</strong> I agree to receive emergency SMS alerts from CrateLuv regarding [Pet Name]'s safety.
            </span>
        </label>

        <button class="btn">Confirm Responsibility</button>
    </div>

    <div class="legal">
        Message and data rates may apply. Reply STOP to cancel at any time. 
        <br><br>
        <a href="/privacy-policy" style="color: #999;">Privacy Policy</a> | <a href="/terms" style="color: #999;">Terms</a>
    </div>
</div>

</body>
</html>
